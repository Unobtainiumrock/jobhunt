[project]
name = "jobhunt-core"
version = "0.1.0"
description = "Shared entity models, profile loader, and schema validators for the unified job-hunt system (BetterApplyPilot + linkedin-leads)."
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "Nicholas Fleischhauer"}]
license = {text = "AGPL-3.0-only"}

dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
validate = ["jsonschema>=4.0"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["jobhunt_core*"]
