[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:vnc]
command=Xtigervnc :1
    -geometry 1920x1080
    -depth 24
    -rfbauth /root/.vnc/passwd
    -rfbport %(ENV_VNC_PORT)s
    -SecurityTypes VncAuth
autorestart=true
priority=10
stdout_logfile=/var/log/vnc.log
stderr_logfile=/var/log/vnc.err

[program:novnc]
command=websockify --web=/usr/share/novnc/ %(ENV_NOVNC_PORT)s localhost:%(ENV_VNC_PORT)s
autorestart=true
priority=20
stdout_logfile=/var/log/novnc.log
stderr_logfile=/var/log/novnc.err

[program:cdp-proxy]
command=nginx -g "daemon off;" -c /etc/nginx/cdp-proxy.conf
autorestart=true
priority=25
stdout_logfile=/var/log/cdp-proxy.log
stderr_logfile=/var/log/cdp-proxy.err

[program:chrome]
command=google-chrome
    --no-sandbox
    --remote-debugging-port=%(ENV_CDP_PORT)s
    --remote-debugging-address=0.0.0.0
    --remote-allow-origins=*
    --user-data-dir=/data/chrome-profile
    --no-first-run
    --disable-default-apps
    --disable-background-timer-throttling
    --disable-backgrounding-occluded-windows
    --disable-renderer-backgrounding
    --start-maximized
    https://www.linkedin.com/feed/
autorestart=true
priority=30
startretries=5
startsecs=5
stdout_logfile=/var/log/chrome.log
stderr_logfile=/var/log/chrome.err
environment=DISPLAY=":1"
