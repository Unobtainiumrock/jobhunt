# Greenhouse Job Board Tokens
#
# Public Greenhouse boards are accessible at
#   https://boards-api.greenhouse.io/v1/boards/<token>/jobs
# Token is usually the company's lowercase name. Some companies are on
# Greenhouse but disable public board access — those won't return rows.
#
# Curated 2026-05-14 to seed Greenhouse discovery for applypilot. Bias is
# AI/ML startups and growth-stage tech where mid-level IC roles cluster.
# Add new entries as you discover them via greenhouse-flavored apply URLs.

greenhouse_boards:

  # ── Foundation-model / AI labs ─────────────────────────────────────────
